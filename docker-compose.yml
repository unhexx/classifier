version: "3.8"

services:
  classifier:
    build: .
    image: unhexx-classifier:latest
    container_name: unhexx-classifier
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/classifier.db
      - LOG_LEVEL=INFO
    volumes:
      - classifier-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  classifier-data:
